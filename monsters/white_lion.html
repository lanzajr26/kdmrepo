<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>KDM: White Lion</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="../kdm-styles.css" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            "notoSerif": ["Noto Serif", "serif"],
            "inter": ["Inter", "sans-serif"],
            "spaceGrotesk": ["Space Grotesk", "monospace"]
          }
        }
      }
    }
  </script>
  <style>
    .monster-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .monster-hero {
      border: 1px solid rgba(91, 64, 60, 0.45);
      background: linear-gradient(145deg, rgba(28, 27, 27, 0.95) 0%, rgba(18, 18, 18, 0.98) 100%);
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
    }

    .monster-hero::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #990000 0%, #e9c349 100%);
    }

    .monster-type-pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(233, 195, 73, 0.45);
      color: #e9c349;
      background: rgba(233, 195, 73, 0.08);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.2rem 0.45rem;
    }

    .monster-section {
      border: 1px solid rgba(91, 64, 60, 0.35);
      background: rgba(28, 27, 27, 0.9);
    }

    .monster-section summary {
      list-style: none;
      cursor: pointer;
      padding: 0.8rem 1rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #e5e2e1;
      border-bottom: 1px solid rgba(91, 64, 60, 0.24);
    }

    .monster-section summary::-webkit-details-marker {
      display: none;
    }

    .monster-section-content {
      padding: 0.9rem 1rem 1rem;
    }

    .monster-note-list {
      margin: 0;
      padding-left: 1rem;
      color: #c6c6c7;
      font-size: 0.92rem;
      line-height: 1.55;
    }

    .terrain-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.8rem;
    }

    .terrain-pill {
      border: 1px solid rgba(255, 180, 168, 0.35);
      background: rgba(153, 0, 0, 0.12);
      color: #ffb4a8;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.45rem;
    }

    .ai-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.7rem;
    }

    .ai-card {
      border: 1px solid rgba(91, 64, 60, 0.35);
      background: rgba(19, 19, 19, 0.9);
      padding: 0.7rem;
    }

    .ai-type {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #ab8983;
      margin-bottom: 0.35rem;
    }

    .board-shell {
      border: 1px solid rgba(91, 64, 60, 0.35);
      background: #141414;
      padding: 0.75rem;
      width: 100%;
    }

    .tool-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 0.7rem;
    }

    .tool-btn {
      border: 1px solid rgba(91, 64, 60, 0.55);
      background: #201f1f;
      color: #e5e2e1;
      padding: 0.35rem 0.55rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease;
    }

    .tool-btn.active {
      border-color: rgba(255, 180, 168, 0.8);
      background: rgba(153, 0, 0, 0.35);
      color: #ffe2dc;
    }

    .tool-btn[data-tool-color="blue"] {
      box-shadow: inset 0 0 0 1px rgba(91, 150, 230, 0.18);
    }

    .tool-btn[data-tool-color="red"] {
      box-shadow: inset 0 0 0 1px rgba(220, 75, 75, 0.22);
    }

    .tool-btn[data-tool-color="green"] {
      box-shadow: inset 0 0 0 1px rgba(83, 189, 117, 0.22);
    }

    .board-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.7rem;
    }

    .board-meta span {
      border: 1px solid rgba(91, 64, 60, 0.4);
      background: rgba(32, 31, 31, 0.8);
      color: #c6c6c7;
      padding: 0.2rem 0.4rem;
      font-size: 11px;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .board-container {
      width: 100%;
      position: relative;
      margin-bottom: 0.7rem;
    }

    .showdown-board {
      width: 100%;
      display: grid;
      gap: 1px;
      background: rgba(91, 64, 60, 0.45);
      border: 1px solid rgba(91, 64, 60, 0.35);
    }

    .board-cell {
      background: #1c1b1b;
      cursor: crosshair;
      aspect-ratio: 1 / 1;
    }

    .token-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .board-token {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.35);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #f8f7f5;
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 2px;
    }

    .board-token.survivor {
      background: rgba(61, 129, 224, 0.88);
    }

    .board-token.monster {
      background: rgba(181, 50, 50, 0.9);
    }

    .board-token.terrain {
      background: rgba(57, 150, 88, 0.9);
    }

    .board-token.ghost {
      opacity: 0.45;
      pointer-events: none;
      border-style: dashed;
    }

    .board-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .board-actions button {
      border: 1px solid rgba(91, 64, 60, 0.55);
      background: #201f1f;
      color: #e5e2e1;
      padding: 0.3rem 0.6rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 1;
    }

    .board-actions button:hover {
      border-color: rgba(255, 180, 168, 0.65);
      background: rgba(153, 0, 0, 0.24);
    }
  </style>
</head>
<body class="bg-background text-on-background font-inter min-h-screen">
  <main class="monster-shell">
    <a href="../bestiary.html" class="inline-flex mb-4 border border-[#5b403c] px-3 py-2 text-xs tracking-[0.12em] uppercase text-[#c6c6c7]">Back to Bestiary</a>

    <section class="monster-hero">
      <p class="monster-type-pill" id="monsterType">Quarry</p>
      <h1 id="monsterName" class="font-notoSerif text-4xl text-[#e5e2e1] mt-3">White Lion</h1>
      <p class="text-[#b4b5b5] max-w-3xl leading-relaxed mt-2">
        Hunt setup, showdown setup, and AI interaction quick-reference with a dedicated showdown board shell ready for Phase 5 interactivity.
      </p>
    </section>

    <section class="grid gap-3 xl:grid-cols-3">
      <details class="monster-section" open>
        <summary id="huntSetupTitle">Hunt Setup</summary>
        <div class="monster-section-content">
          <ul class="monster-note-list" id="huntSetupNotes"></ul>
          <div class="terrain-list" id="huntTerrainList"></div>
        </div>
      </details>

      <details class="monster-section" open>
        <summary id="showdownSetupTitle">Showdown Setup</summary>
        <div class="monster-section-content">
          <ul class="monster-note-list" id="showdownSetupNotes"></ul>
        </div>
      </details>

      <details class="monster-section" open>
        <summary>AI Card Interactions</summary>
        <div class="monster-section-content">
          <div class="ai-grid" id="aiCardGrid"></div>
        </div>
      </details>

      <details class="monster-section xl:col-span-3" open>
        <summary>Showdown Board</summary>
        <div class="monster-section-content">
          <div class="board-shell">
            <div class="tool-palette" id="toolPalette"></div>
            <div class="board-meta" id="boardMeta"></div>
            <div class="board-container" id="boardContainer">
              <div class="showdown-board" id="showdownBoard" aria-label="Showdown board"></div>
              <div class="token-layer" id="tokenLayer"></div>
            </div>
            <div class="board-actions">
              <button type="button" id="resetBoardButton">Reset to Start</button>
              <button type="button" id="clearBoardButton">Clear All</button>
            </div>
          </div>
        </div>
      </details>
    </section>
  </main>

  <script src="../kdm-data.js"></script>
  <script>
    const MONSTER_ID = 'white_lion';
    const TOOL_DEFINITIONS = [
      { id: 'survivor_1', label: 'Survivor 1', type: 'survivor', color: 'blue', spanCols: 1, spanRows: 1 },
      { id: 'survivor_2', label: 'Survivor 2', type: 'survivor', color: 'blue', spanCols: 1, spanRows: 1 },
      { id: 'survivor_3', label: 'Survivor 3', type: 'survivor', color: 'blue', spanCols: 1, spanRows: 1 },
      { id: 'survivor_4', label: 'Survivor 4', type: 'survivor', color: 'blue', spanCols: 1, spanRows: 1 },
      { id: 'white_lion', label: 'Monster', type: 'monster', color: 'red', spanCols: 2, spanRows: 2 },
      { id: 'terrain', label: 'Terrain', type: 'terrain', color: 'green', spanCols: 1, spanRows: 1 },
      { id: 'eraser', label: 'Eraser', type: 'eraser', color: 'neutral', spanCols: 1, spanRows: 1 }
    ];

    let boardSetup = null;
    let activeTool = 'survivor_1';
    let placedTokens = [];
    let ghostToken = null;
    let terrainCounter = 0;

    function renderList(target, items) {
      target.innerHTML = '';
      (items || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        target.appendChild(li);
      });
    }

    function renderTerrain(target, terrain) {
      target.innerHTML = '';
      (terrain || []).forEach(item => {
        const chip = document.createElement('span');
        chip.className = 'terrain-pill';
        chip.textContent = item;
        target.appendChild(chip);
      });
    }

    function renderAICards(target, cards) {
      target.innerHTML = '';
      (cards || []).forEach(card => {
        const article = document.createElement('article');
        article.className = 'ai-card';
        article.innerHTML = [
          '<p class="ai-type">' + (card.type || 'AI Card') + '</p>',
          '<h3 class="font-notoSerif text-lg text-[#e5e2e1] mb-2">' + (card.name || 'Unnamed Card') + '</h3>',
          '<p class="text-[#c6c6c7] text-sm leading-relaxed">' + (card.description || '') + '</p>'
        ].join('');
        target.appendChild(article);
      });
    }

    function getToolById(id) {
      return TOOL_DEFINITIONS.find(tool => tool.id === id) || TOOL_DEFINITIONS[0];
    }

    function cellsOverlap(a, b) {
      const aRight = a.col + a.spanCols;
      const aBottom = a.row + a.spanRows;
      const bRight = b.col + b.spanCols;
      const bBottom = b.row + b.spanRows;
      return !(aRight <= b.col || bRight <= a.col || aBottom <= b.row || bBottom <= a.row);
    }

    function canPlaceToken(candidate, tokenIdToIgnore = null) {
      const cols = boardSetup.board.cols;
      const rows = boardSetup.board.rows;

      if (candidate.col < 0 || candidate.row < 0) return false;
      if (candidate.col + candidate.spanCols > cols) return false;
      if (candidate.row + candidate.spanRows > rows) return false;

      return !placedTokens.some(token => {
        if (tokenIdToIgnore && token.id === tokenIdToIgnore) return false;
        return cellsOverlap(token, candidate);
      });
    }

    function ensureGhostToken() {
      if (ghostToken) return ghostToken;
      const el = document.createElement('div');
      el.className = 'board-token ghost';
      el.hidden = true;
      document.getElementById('tokenLayer').appendChild(el);
      ghostToken = el;
      return ghostToken;
    }

    function getCellSize() {
      const container = document.getElementById('boardContainer');
      const view = getBoardViewDimensions();
      return {
        width: container.clientWidth / view.viewCols,
        height: container.clientHeight / view.viewRows
      };
    }

    function getBoardViewDimensions() {
      const dataCols = boardSetup.board.cols;
      const dataRows = boardSetup.board.rows;
      return {
        dataCols,
        dataRows,
        viewCols: dataRows,
        viewRows: dataCols
      };
    }

    function viewToDataCell(viewCol, viewRow) {
      const dims = getBoardViewDimensions();
      return {
        col: viewRow,
        row: dims.dataRows - 1 - viewCol
      };
    }

    function getViewRectForToken(token) {
      const dims = getBoardViewDimensions();
      const left = dims.dataRows - (token.row + token.spanRows);
      const top = token.col;
      return {
        left,
        top,
        width: token.spanRows,
        height: token.spanCols
      };
    }

    function positionTokenElement(el, token) {
      const size = getCellSize();
      const rect = getViewRectForToken(token);
      el.style.left = (rect.left * size.width) + 'px';
      el.style.top = (rect.top * size.height) + 'px';
      el.style.width = (rect.width * size.width) + 'px';
      el.style.height = (rect.height * size.height) + 'px';
    }

    function renderBoardMeta(container, boardSetup) {
      const meta = [
        'Grid ' + boardSetup.board.cols + 'x' + boardSetup.board.rows,
        'View ' + boardSetup.board.rows + 'x' + boardSetup.board.cols,
        'Monster Start: c' + boardSetup.monster.col + ' r' + boardSetup.monster.row,
        'Survivor Starts: ' + boardSetup.survivors.length,
        'Terrain Seeds: ' + (boardSetup.terrain || []).length
      ];

      container.innerHTML = '';
      meta.forEach(value => {
        const badge = document.createElement('span');
        badge.textContent = value;
        container.appendChild(badge);
      });
    }

    function renderToolPalette() {
      const palette = document.getElementById('toolPalette');
      palette.innerHTML = '';

      TOOL_DEFINITIONS.forEach(tool => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tool-btn';
        btn.textContent = tool.label;
        btn.dataset.toolId = tool.id;
        if (tool.color !== 'neutral') {
          btn.dataset.toolColor = tool.color;
        }
        btn.classList.toggle('active', tool.id === activeTool);
        btn.addEventListener('click', () => {
          activeTool = tool.id;
          renderToolPalette();
          const ghost = ensureGhostToken();
          ghost.hidden = true;
        });
        palette.appendChild(btn);
      });
    }

    function clearGhost() {
      const ghost = ensureGhostToken();
      ghost.hidden = true;
    }

    function updateGhostAtCell(col, row) {
      const tool = getToolById(activeTool);
      const ghost = ensureGhostToken();
      if (tool.id === 'eraser') {
        ghost.hidden = true;
        return;
      }

      const ghostTokenData = {
        col,
        row,
        spanCols: tool.spanCols,
        spanRows: tool.spanRows,
        type: tool.type,
        label: tool.label
      };

      const fits = canPlaceToken(ghostTokenData, tool.id);
      ghost.className = 'board-token ghost ' + tool.type;
      ghost.textContent = tool.type === 'terrain' ? 'Terrain' : tool.label;
      ghost.style.opacity = fits ? '0.45' : '0.2';
      ghost.hidden = false;
      positionTokenElement(ghost, ghostTokenData);
    }

    function placeFromTool(col, row) {
      const tool = getToolById(activeTool);
      if (tool.id === 'eraser') {
        removeTokenAt(col, row);
        return;
      }

      const candidate = {
        id: tool.id,
        label: tool.label,
        type: tool.type,
        color: tool.color,
        col,
        row,
        spanCols: tool.spanCols,
        spanRows: tool.spanRows
      };

      if (tool.type === 'terrain') {
        terrainCounter += 1;
        candidate.id = 'terrain_' + terrainCounter;
        candidate.label = 'Terrain ' + terrainCounter;
      }

      const ignoreId = tool.type === 'terrain' ? null : candidate.id;
      if (!canPlaceToken(candidate, ignoreId)) return;

      if (tool.type !== 'terrain') {
        placedTokens = placedTokens.filter(token => token.id !== candidate.id);
      }

      placedTokens.push(candidate);
      renderPlacedTokens();
    }

    function tokenAtCell(col, row) {
      return placedTokens.find(token => {
        return col >= token.col && col < token.col + token.spanCols && row >= token.row && row < token.row + token.spanRows;
      }) || null;
    }

    function removeTokenAt(col, row) {
      const target = tokenAtCell(col, row);
      if (!target) return;
      placedTokens = placedTokens.filter(token => token.id !== target.id);
      renderPlacedTokens();
    }

    function renderPlacedTokens() {
      const layer = document.getElementById('tokenLayer');
      const ghost = ensureGhostToken();
      layer.innerHTML = '';
      layer.appendChild(ghost);

      placedTokens.forEach(token => {
        const el = document.createElement('div');
        el.className = 'board-token ' + token.type;
        el.textContent = token.type === 'terrain' ? 'Terrain' : token.label;
        el.title = token.label + ' (' + token.col + ', ' + token.row + ')';
        el.addEventListener('click', event => {
          event.preventDefault();
          event.stopPropagation();
          placedTokens = placedTokens.filter(existing => existing.id !== token.id);
          renderPlacedTokens();
        });
        positionTokenElement(el, token);
        layer.appendChild(el);
      });
    }

    function createBoardCells() {
      const board = document.getElementById('showdownBoard');
      board.innerHTML = '';
      const view = getBoardViewDimensions();
      board.style.gridTemplateColumns = 'repeat(' + view.viewCols + ', 1fr)';
      board.style.gridTemplateRows = 'repeat(' + view.viewRows + ', 1fr)';

      for (let viewRow = 0; viewRow < view.viewRows; viewRow++) {
        for (let viewCol = 0; viewCol < view.viewCols; viewCol++) {
          const dataCell = viewToDataCell(viewCol, viewRow);
          const cell = document.createElement('div');
          cell.className = 'board-cell';
          cell.dataset.col = String(dataCell.col);
          cell.dataset.row = String(dataCell.row);
          cell.addEventListener('mouseenter', () => updateGhostAtCell(dataCell.col, dataCell.row));
          cell.addEventListener('mousemove', () => updateGhostAtCell(dataCell.col, dataCell.row));
          cell.addEventListener('mouseleave', () => clearGhost());
          cell.addEventListener('click', () => placeFromTool(dataCell.col, dataCell.row));
          board.appendChild(cell);
        }
      }
    }

    function buildStartingTokens() {
      const tokens = [];
      const monster = boardSetup.monster;
      if (monster) {
        tokens.push({
          id: monster.id,
          label: monster.label,
          type: 'monster',
          color: 'red',
          col: monster.col,
          row: monster.row,
          spanCols: monster.spanCols,
          spanRows: monster.spanRows
        });
      }

      (boardSetup.survivors || []).forEach(survivor => {
        tokens.push({
          id: survivor.id,
          label: survivor.label,
          type: 'survivor',
          color: 'blue',
          col: survivor.col,
          row: survivor.row,
          spanCols: survivor.spanCols,
          spanRows: survivor.spanRows
        });
      });

      (boardSetup.terrain || []).forEach((terrain, index) => {
        tokens.push({
          id: terrain.id || 'terrain_seed_' + (index + 1),
          label: terrain.label || 'Terrain',
          type: 'terrain',
          color: 'green',
          col: terrain.col,
          row: terrain.row,
          spanCols: terrain.spanCols || 1,
          spanRows: terrain.spanRows || 1
        });
      });

      return tokens;
    }

    function resetBoardToStart() {
      placedTokens = buildStartingTokens();
      terrainCounter = placedTokens.filter(token => token.type === 'terrain').length;
      renderPlacedTokens();
      clearGhost();
    }

    function clearBoard() {
      placedTokens = [];
      renderPlacedTokens();
      clearGhost();
    }

    function titleCase(value) {
      return String(value || '').replace(/_/g, ' ').replace(/\b\w/g, s => s.toUpperCase());
    }

    function initMonsterPage() {
      if (typeof MONSTER_DATA !== 'object' || !MONSTER_DATA[MONSTER_ID]) {
        console.warn('Monster data not found for', MONSTER_ID);
        return;
      }

      const monster = MONSTER_DATA[MONSTER_ID];

      document.getElementById('monsterName').textContent = monster.name || 'Monster';
      document.getElementById('monsterType').textContent = titleCase(monster.type || 'Unknown');

      document.getElementById('huntSetupTitle').textContent = monster.huntSetup?.title || 'Hunt Setup';
      renderList(document.getElementById('huntSetupNotes'), monster.huntSetup?.notes || []);
      renderTerrain(document.getElementById('huntTerrainList'), monster.huntSetup?.terrainDeck || []);

      document.getElementById('showdownSetupTitle').textContent = monster.showdownSetup?.title || 'Showdown Setup';
      renderList(document.getElementById('showdownSetupNotes'), monster.showdownSetup?.notes || []);

      renderAICards(document.getElementById('aiCardGrid'), monster.aiCards || []);

      boardSetup = monster.boardSetup || { board: { cols: 16, rows: 22 }, monster: null, survivors: [], terrain: [] };
      renderBoardMeta(document.getElementById('boardMeta'), boardSetup);
      createBoardCells();
      renderToolPalette();
      resetBoardToStart();

      document.getElementById('resetBoardButton').addEventListener('click', resetBoardToStart);
      document.getElementById('clearBoardButton').addEventListener('click', clearBoard);

      window.addEventListener('resize', () => {
        renderPlacedTokens();
        clearGhost();
      });
    }

    initMonsterPage();
  </script>
</body>
</html>
