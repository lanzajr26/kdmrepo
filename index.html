<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KD:M Survivor</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
    }

#statusRow {
  display: flex;
  justify-content: center;
  align-items: stretch;
  flex-wrap: wrap;
  gap: 20px;
  max-width: 760px;
  width: 100%;
  margin: 0 auto 20px;
  box-sizing: border-box;
}

#statusRow > #survivorHeader {
  flex: 1 1 360px;
  min-width: 280px;
  max-width: none;
  margin: 0;
}

#statusRow > #bleedTracker {
  flex: 0 0 auto;
  min-width: 180px;
  max-width: 240px;
  margin: 0;
  align-self: center;
}

#statusRow > #survivalBlock {
  flex: 1 1 100%;
  margin: 0;
}

@media (max-width: 900px) {
  #statusRow { flex-direction: column; align-items: stretch; }

  #statusRow > #bleedTracker {
    max-width: none;
  }
}

/* bleed tracker itself (inside the status row) */
#bleedTracker {
  display: flex;
  gap: 12px;
  margin: 0;
  justify-content: center;
}

.bleed-token {
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: transform 0.15s ease;
}

.bleed-token:hover {
  transform: scale(1.1);
}

.bleed-token svg {
  width: 100%;
  height: 100%;
}

.bleed-token svg path {
  fill: transparent;
  stroke: #900;
  stroke-width: 6;
  transition: fill 0.2s ease, stroke 0.2s ease;
}

.bleed-token.active svg path {
  fill: #c00;
  stroke: #600;
}

/* Survivor Header */
#survivorHeader {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

#survivorHeader input,
#survivorHeader select {
  background: #222;
  color: #eee;
  border: 1px solid #555;
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 6px;
  flex: 1;
  min-width: 0;
}

#survivorSex {
  flex: 0 0 110px;
}

/* Character Selector */
#characterSelector {
  max-width: 760px;
  width: 100%;
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: center;
  margin: 0 auto 20px;
  padding: 0 8px;
  box-sizing: border-box;
}

#characterSelector select,
#characterSelector button {
  background: #222;
  color: #eee;
  border: 1px solid #555;
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 6px;
  cursor: pointer;
}

#characterSelector button:hover {
  background: #333;
}

#layoutModeToggle {
  min-width: 140px;
}

/* Survival Block */
#survivalBlock {
  flex: 1;
  min-width: 300px;
  background: #1a1a1a;
  border: 1px solid #444;
  padding: 12px 16px 16px;
  border-radius: 6px;
  margin: 0 0 20px;
  box-sizing: border-box;
}

    #survivalBlock h2 {
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }

    #survivalRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #survivalValue {
      width: 35px;
      background: #222;
      color: #eee;
      border: 1px solid #555;
      padding: 8px 10px;
      font-size: 18px;
      border-radius: 6px;
    }

    #survivalActions {
      display: flex;
      gap: 10px;
    }

    .survivalAction {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
    }

    .survivalAction input {
      width: 18px;
      height: 18px;
    }

#layoutContainer {
  max-width: 760px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
}

#leftColumn,
#rightColumn {
  width: 100%;
}
   
    /* Stats Block */
#statsBlock {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #444;
  padding: 15px 20px;
  border-radius: 6px;
  margin-bottom: 25px;
  box-sizing: border-box;
}

#statsBlock h2,
#armorBlock h2,
#survivalBlock h2,
#fightingArtsBlock h2,
#disordersBlock h2,
#abilitiesBlock h2,
#injuriesBlock h2 {
  margin: 0 0 12px 0;
  font-size: 20px;
  font-weight: 600;
  color: #fff;
  font-family: 'Baskerville BT', 'Baskerville', 'Georgia', serif;
}

#statsTable {
  width: 100%;
  border-collapse: collapse;
  color: #eee;
}

#statsTable th,
#statsTable td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid #333;
}

#statsTable input {
  width: 60px;
  background: #222;
  color: #eee;
  border: 1px solid #555;
  padding: 6px;
  border-radius: 4px;
  text-align: center;
}

#statsTable tr[data-row="total"] td {
  font-weight: bold;
  background: #111;
}

/* Armor Block */
#armorBlock {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #444;
  padding: 15px 20px;
  border-radius: 6px;
  margin-bottom: 25px;
  box-sizing: border-box;
}
#armorBlock h2 {
  margin: 0 0 12px 0;
  font-size: 20px;
  font-weight: 600;
  color: #fff;
}
#armorTable {
  width: 100%;
  border-collapse: collapse;
  color: #eee;
}
#armorTable th,
#armorTable td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid #333;
}
#armorTable input[type="number"] {
  width: 80px;
  background: #222;
  color: #eee;
  border: 1px solid #555;
  padding: 6px;
  border-radius: 4px;
  text-align: center;
}
#armorTable label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-right: 6px;
  font-size: 14px;
}

/* Selection Blocks (Fighting Arts, Disorders, Abilities, Injuries) */
.selections-block {
  background: #1a1a1a;
  border: 1px solid #444;
  padding: 15px 20px;
  border-radius: 6px;
  margin: 0;
  box-sizing: border-box;
}

#selectionBlocks {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  max-width: 100%;
  width: 100%;
  margin: 0 auto 25px;
  box-sizing: border-box;
}

@media (max-width: 900px) {
  #selectionBlocks { grid-template-columns: 1fr; }
}

.selections-block h2 {
  margin: 0 0 12px 0;
  font-size: 20px;
  font-weight: 600;
  color: #fff;
}

.selection-entry {
  margin-bottom: 15px;
}

.selection-entry select {
  width: 100%;
  background: #222;
  color: #eee;
  border: 1px solid #555;
  padding: 10px;
  border-radius: 4px;
  font-size: 14px;
  box-sizing: border-box;
}

.selection-info {
  background: #111;
  border-left: 3px solid #666;
  padding: 10px;
  border-radius: 4px;
  margin-top: 8px;
  font-size: 13px;
  line-height: 1.5;
}

.selection-info p {
  margin: 4px 0;
}

.selection-info em {
  color: #aaa;
}

.glossary-term {
  cursor: help;
  border-bottom: 1px dotted #aaa;
  color: #ff9;
}

.glossary-term:hover {
  color: #fff;
  border-bottom: 1px dotted #fff;
  background: rgba(255, 255, 153, 0.1);
  padding: 0 2px;
  border-radius: 2px;
}

    /* GRID SIZE — 250px squares */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 250px);
      grid-template-rows: repeat(3, 250px);
      gap: 8px;
      margin: 0 auto 25px;
      justify-content: center;
    }

    .armor-set-bonus {
      max-width: 100%;
      width: 100%;
      margin: 0 auto 10px;
      padding: 10px 14px;
      box-sizing: border-box;
      border-radius: 6px;
      background: #1f4f1f;
      border: 1px solid #2f7f2f;
      color: #b8fdb8;
      font-weight: 600;
      font-size: 15px;
      display: none;
    }

    .cell {
      position: relative;
      background: #222;
      border: 2px solid #444;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      overflow: hidden;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .cell img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* WHITE MATCH GLOW */
    .cell.match {
      border-color: #fff;
      box-shadow: 0 0 20px 6px rgba(255, 255, 255, 0.75);
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content-wrapper {
      background: #222;
      padding: 20px;
      border-radius: 8px;
      max-height: 80vh;
      overflow-y: auto;
      width: 80vw;
      max-width: 900px;
    }

    .modal-controls {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 15px;
      padding-bottom: 4px;
      background: #222;
    }

    #searchBox {
      flex: 1 1 320px;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #555;
      background: #111;
      color: #eee;
    }

    #craftingLocationFilter {
      flex: 0 1 240px;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #555;
      background: #111;
      color: #eee;
    }

    .modal-content {
      display: grid;
      grid-template-columns: repeat(auto-fill, 160px);
      gap: 12px;
    }

    .thumb {
      width: 160px;
      min-height: 190px;
      background: #333;
      border: 2px solid #555;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      overflow: hidden;
      gap: 8px;
      padding: 8px;
      box-sizing: border-box;
    }

    .thumb img {
      max-width: 100%;
      max-height: 120px;
      object-fit: contain;
    }

    .thumb-label,
    .thumb-location {
      width: 100%;
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
    }

    .thumb-label {
      font-size: 12px;
      color: #f3f3f3;
    }

    .thumb-location {
      font-size: 11px;
      color: #b8fdb8;
    }

    .empty-search-results {
      margin: 0;
      color: #bbb;
    }

body.landscape-mode #layoutContainer {

@media (max-width: 1300px) {

  }

  body.landscape-mode .grid {

  }
}

  function getImageDataByFile(filename) {
    return images.find(img => img.file === filename) || null;

  function getCellIndex(cell) {
    return parseInt(cell.dataset.index, 10);
  }

  function getCellAt(row, col) {
    if (row < 0 || row > 2 || col < 0 || col > 2) return null;
    const index = row * 3 + col;
    return document.querySelector('.cell[data-index="' + index + '"]');
  }

  function getNeighbors(cell) {
    const idx = getCellIndex(cell);
    const row = Math.floor(idx / 3);
    const col = idx % 3;

    return {
      top: getCellAt(row - 1, col),
      right: getCellAt(row, col + 1),
      bottom: getCellAt(row + 1, col),
      left: getCellAt(row, col - 1)
    };
  }

  function getCellAffinities(cell) {
    const filename = cell.dataset.filename;
    if (!filename) return null;
    const data = getImageDataByFile(filename);
    return data ? data.affinities : null;
  }

  function clearAllMatches() {
    document.querySelectorAll(".cell").forEach(cell => {
      cell.classList.remove("match");
    });

  function getActiveArmorSet() {
    const equippedItems = Object.values(equipment);
    for (const set of ARMOR_SETS) {
      const hasAllPieces = set.pieces.every(piece => equippedItems.includes(piece));
      if (hasAllPieces) return set;
    }
    return null;
  }

  function renderArmorSetBonusText(set) {
    const bonusTextDiv = document.getElementById('armorSetBonusText');
    if (!set) {
      bonusTextDiv.style.display = 'none';
      bonusTextDiv.innerHTML = '';
      return;
    }

    bonusTextDiv.style.display = 'block';
    bonusTextDiv.innerHTML = `<strong>Armor Set Active:</strong> ${set.name} - ${parseDescription(set.description)}`;
  }

  function modifyArmorSetBonus(bonus, multiplier) {
    if (!bonus) return;

    // Stats
    const eqRow = document.querySelector('tr[data-row="equipped"]');
    const statInputs = eqRow.querySelectorAll('input');
    const statOrder = ['move','accuracy','strength','evasion','luck','speed'];
    statOrder.forEach((key, i) => {
      const delta = (bonus.stats[key] || 0) * multiplier;
      if (delta === 0) return;
      const current = parseInt(statInputs[i].value || 0, 10);
      statInputs[i].value = Math.max(0, current + delta);
    });

    // Armor
    const slotMap = { brain: 'Brain', head: 'Head', arms: 'Arms', body: 'Body', legs: 'Legs', waist: 'Waist' };
    Object.entries(bonus.armor).forEach(([slot, value]) => {
      if (value === 0) return;
      const row = Array.from(document.querySelectorAll('#armorTable tbody tr'))
        .find(r => r.firstElementChild.textContent.trim().toLowerCase().includes(slotMap[slot].toLowerCase()));
      if (!row) return;
      const input = row.querySelector('input[type="number"]');
      const current = parseInt(input.value || 0, 10);
      if (multiplier === 1) {
        input.value = current + value;
      } else {
        input.value = Math.max(0, current - value);
      }
    });

    updateStatTotals();
  }

  function updateArmorSetBonusState() {
    const previousSetId = characterData.activeArmorSet || '';
    const activeSet = getActiveArmorSet();

    if (!activeSet) {
      if (previousSetId) {
        const previousSet = ARMOR_SETS.find(s => s.id === previousSetId);
        if (previousSet) modifyArmorSetBonus(previousSet.bonus, -1);
      }
      characterData.activeArmorSet = '';
      activeArmorSetId = '';
      renderArmorSetBonusText(null);
      saveCharacter();
      return;
    }

    if (activeSet.id === previousSetId) {
      renderArmorSetBonusText(activeSet);
      return;
    }

    if (previousSetId) {
      const previousSet = ARMOR_SETS.find(s => s.id === previousSetId);
      if (previousSet) modifyArmorSetBonus(previousSet.bonus, -1);
    }

    modifyArmorSetBonus(activeSet.bonus, 1);
    characterData.activeArmorSet = activeSet.id;
    activeArmorSetId = activeSet.id;
    renderArmorSetBonusText(activeSet);
    saveCharacter();
  }

  function recomputeMatches() {
    clearAllMatches();

    const cells = Array.from(document.querySelectorAll(".cell"));

    cells.forEach(cell => {
      const aff = getCellAffinities(cell);
      if (!aff) return;

      const neighbors = getNeighbors(cell);

      if (neighbors.right) {
        const affN = getCellAffinities(neighbors.right);
        if (affN && aff.right && affN.left && aff.right === affN.left) {
          markMatch(cell, neighbors.right);
        }
      }

      if (neighbors.bottom) {
        const affN = getCellAffinities(neighbors.bottom);
        if (affN && aff.bottom && affN.top && aff.bottom === affN.top) {
          markMatch(cell, neighbors.bottom);
        }
      }
    });
  }

  function markMatch(cellA, cellB) {
    cellA.classList.add("match");
    cellB.classList.add("match");
  }

      removeGearAttributes(oldFilename);
    }

    cell.dataset.filename = filename || "";
    characterData.gridImages[index] = filename || "";
    
    // Apply attributes from new item
    if (filename) {
      equipment[index] = filename;
      applyGearAttributes(filename);
    } else {
      delete equipment[index];
    }

    saveCharacter();

    cell.innerHTML = "";
    if (filename) {
      const img = document.createElement("img");
      img.src = imageFolder + filename;
      cell.appendChild(img);

      const data = getImageDataByFile(filename);
      applyAffinities(cell, data ? data.affinities : null);
    }

    recomputeMatches();
    updateArmorSetBonusState();
  }

// GLOSSARY PARSER
function parseDescription(text) {
  return text.replace(/\[([^\]]+)\]/g, (match, term) => {
    const definition = GLOSSARY[term.toLowerCase()];
    if (definition) {
      return `<span class="glossary-term" title="${definition.replace(/"/g, '&quot;')}">[${term}]</span>`;
    }
    return match;
  });
}

function initializeSelectionBlock(type, maxCount = 3) {
  const collectionMap = {
    fightingArt: FIGHTING_ARTS_LIST,
    disorder: DISORDERS_LIST,
    ability: ABILITIES_LIST,
    injury: SEVERE_INJURIES_LIST
  };

  const list = collectionMap[type];
  if (!list) { console.warn(`Missing list for type: ${type}`); return; }

  for (let i = 1; i <= maxCount; i++) {
    const select = document.getElementById(`${type}${i}`);
    const infoDiv = document.getElementById(`${type}${i}-info`);
    if (!select) continue;

    select.innerHTML = '';
    select.appendChild(Object.assign(document.createElement('option'), { value: '', textContent: '-- Select --' }));

    list.forEach(item => {
      const option = document.createElement('option');
      option.value = item.id;
      option.textContent = item.name;
      select.appendChild(option);
    });

    select.addEventListener('change', () => {
      if (!select.value) {
        infoDiv.innerHTML = '';
      } else {
        const value = list.find(item => item.id === select.value);
        infoDiv.innerHTML = value ? `<p><strong>${value.name}</strong></p><p>${parseDescription(value.description)}</p><p><em>Effect: ${value.effect}</em></p>` : '';
      }
      updateCharacterSelections(type);
      saveCharacter();
    });
  }
}

function updateCharacterSelections(type) {
  const key = type === 'fightingArt' ? 'fightingArts' : type === 'disorder' ? 'disorders' : type === 'ability' ? 'abilities' : type === 'injury' ? 'severeInjuries' : null;
  if (!key) return;

  const values = [];
  for (let i = 1; i <= 3; i++) {
    const select = document.getElementById(`${type}${i}`);
    if (select && select.value) values.push({ id: select.value, notes: '' });
  }
  characterData[key] = values;
}

function applySavedSelections() {
  ['fightingArt', 'disorder', 'ability', 'injury'].forEach(type => {
    const key = type === 'fightingArt' ? 'fightingArts' : type === 'disorder' ? 'disorders' : type === 'ability' ? 'abilities' : 'severeInjuries';
    const list = characterData[key] || [];
    for (let i = 1; i <= 3; i++) {
      const select = document.getElementById(`${type}${i}`);
      if (!select) continue;
      select.value = (list[i - 1] && list[i - 1].id) || '';
      select.dispatchEvent(new Event('change'));
    }
  });
}

function applyGearAttributes(filename) {
  const data = getImageDataByFile(filename);
  if (!data || !data.attributes) return;

  const attrs = data.attributes;
  const eqRow = document.querySelector('tr[data-row="equipped"]');
  const statInputs = eqRow.querySelectorAll('input');
  const statOrder = ['move','accuracy','strength','evasion','luck','speed'];

  statOrder.forEach((key, i) => {
    const bonus = (attrs.stats[key] || 0);
    if (bonus !== 0) {
      const current = parseInt(statInputs[i].value || 0, 10);
      statInputs[i].value = current + bonus;
    }
  });

  // Armor
  Object.entries(attrs.armor).forEach(([slot, bonus]) => {
    if (bonus === 0) return;
    const slotMap = { brain: 'Brain', head: 'Head', arms: 'Arms', body: 'Body', legs: 'Legs', waist: 'Waist' };
    const row = Array.from(document.querySelectorAll('#armorTable tbody tr'))
      .find(r => r.firstElementChild.textContent.trim().toLowerCase().includes(slotMap[slot].toLowerCase()));
    if (row) {
      const input = row.querySelector('input[type="number"]');
      const current = parseInt(input.value || 0, 10);
      input.value = current + bonus;
    }
  });

  updateStatTotals();
}

function removeGearAttributes(filename) {
  const data = getImageDataByFile(filename);
  if (!data || !data.attributes) return;

  const attrs = data.attributes;
  const eqRow = document.querySelector('tr[data-row="equipped"]');
  const statInputs = eqRow.querySelectorAll('input');
  const statOrder = ['move','accuracy','strength','evasion','luck','speed'];

  statOrder.forEach((key, i) => {
    const bonus = (attrs.stats[key] || 0);
    if (bonus !== 0) {
      const current = parseInt(statInputs[i].value || 0, 10);
      statInputs[i].value = Math.max(0, current - bonus);
    }
  });

  // Armor
  Object.entries(attrs.armor).forEach(([slot, bonus]) => {
    if (bonus === 0) return;
    const slotMap = { brain: 'Brain', head: 'Head', arms: 'Arms', body: 'Body', legs: 'Legs', waist: 'Waist' };
    const row = Array.from(document.querySelectorAll('#armorTable tbody tr'))
      .find(r => r.firstElementChild.textContent.trim().toLowerCase().includes(slotMap[slot].toLowerCase()));
    if (row) {
      const input = row.querySelector('input[type="number"]');
      const current = parseInt(input.value || 0, 10);
      input.value = Math.max(0, current - bonus);
    }
  });

  updateStatTotals();
}

});

document.getElementById('saveSlot').addEventListener('click', () => {
  // Update characterData from UI
  characterData.survivorName = document.getElementById('survivorName').value;
  characterData.survivorSex = document.getElementById('survivorSex').value;
  characterData.bleedState = [...bleedState];
  characterData.survivalValue = parseInt(document.getElementById('survivalValue').value) || 0;
  // TODO: update attributes, armor, etc.
  saveCharacter();
  alert('Character saved to slot ' + currentSlot);
});

document.getElementById('loadSlot').addEventListener('click', () => {
  loadCharacter();
  applyCharacterDataToUI();
});

document.getElementById('deleteSlot').addEventListener('click', () => {
  if (confirm('Delete character in slot ' + currentSlot + '?')) {
    localStorage.removeItem(`kdmCharacter${currentSlot}`);
    loadCharacter(); // Load defaults
    applyCharacterDataToUI();
  }
});

document.getElementById('layoutModeToggle').addEventListener('click', () => {
  const nextMode = characterData.layoutMode === 'landscape' ? 'portrait' : 'landscape';
  applyLayoutMode(nextMode);
  saveCharacter();
});

// Save on changes
document.getElementById('survivorName').addEventListener('input', () => {
  characterData.survivorName = document.getElementById('survivorName').value;
  saveCharacter();
});

document.getElementById('survivorSex').addEventListener('change', () => {
  characterData.survivorSex = document.getElementById('survivorSex').value;
  saveCharacter();
});

document.getElementById('survivalValue').addEventListener('input', () => {
  characterData.survivalValue = parseInt(document.getElementById('survivalValue').value) || 0;
  saveCharacter();
});

// TODO: add listeners for attributes, armor changes

</script>

</body>
</html>
